{% extends 'shared/base.html' %}
{% block title %} {{ page_title }} {% endblock %}
{% block content %}
<h1>Delete Label size</h1>
    <form method="post">
    {% csrf_token %}

        <p>Are you sure you want to delete "{{ size.size}}" label size?</p>

        <button class="btn btn-danger" type="submit">Confirm</button>
        <a href="{% url 'labels:sizes_index' %}" class="btn btn-secondary">Cancel</a>
    </form>
{% endblock %}
