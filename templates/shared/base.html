{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .logo {
            width: 80px;
        }
    </style>
</head>
<body class="bg-light">
<header class="bg-white border-bottom py-3 mb-4">
    <div class="container d-flex flex-column align-items-center">
        <div class="d-flex align-items-center justify-content-center mb-2">
            <img src="{% static 'images/wham2025.jpg' %}" alt="wham logo" class="logo" style="width: 80px;">
            <h1 class="h3 mb-0 ms-3">Colourman Board</h1>
        </div>
        <div id="current-datetime" class="text-muted small"></div>
        <script>
            function updateDateTime() {
                const now = new Date();
                document.getElementById('current-datetime').textContent = now.toLocaleString('en-GB', {
                    dateStyle: 'full',
                    timeStyle: 'medium'
                });
            }
            updateDateTime();
            setInterval(updateDateTime, 1000);
        </script>
    </div>
        
    {% include nav_path %}
</header>

<main class="container">
    {% block content %}
    {% endblock %}
</main>

<footer class="container text-center mt-5 py-3 border-top text-muted small">
    <p class="mb-0">Copyright © 2025-2026 <a href="mailto:Kamen.Kadiyski@whatmoreuk.com" class="text-decoration-none">Kamen Kadiyski</a></p>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
